<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>"https://cdn.tailwindcss.com"></script>
</script>
</head>
<body>
    <div class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded shadow">
    <h1 class="text-3xl font-bold mb-4">Product Add System</h1>
    <input class="add" type="text">
    <button class="btn1">add</button>
    <div class="ul">
    </ul>
    </div>
    <script>
        const btn1 = document.querySelector(".btn1")
        const add = document.querySelector(".add")
        const ul = document.querySelector(".ul")
        btn1.addEventListener("click", () => {
           let li = document.createElement("li")
           li.innerText = add.value 
           ul.appendChild(li)
           document.body.appendChild(ul)
        })

    </script>
</body>
</html>
