<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://cdn.tailwindcss.com"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    
    </head>
    <body class="bg-black flex justify-center items-start w-full h-screen ">
        <div class="flex items-start grid grid-cols-1 gap-4">
            <img class="w-20 h-20 my-8 justify-center" src="mobile-logo.png" alt="">
            <h1 class="text-white font-white text-4xl me-10 text-shadow-lg text-shadow-(color:white)">Нэвтрэх</h1>
            <p class="text-gray-400">И-мэйл / Хэрэглэгчийн нэр</p>
            <div class="relative w-full mx-auto">
  <input id="email" type="email" placeholder="И-мэйл хаяг оруулна уу" class="bg-gray-800 border-2 border-gray-600 w-full p-2 border rounded pr-10" />
</div>
            <div class="flex items-start grid grid-cols-2 gap-4 me-10">
            <p class="text-gray-400">Password</p>
            <a class="text-white underline" href="#">Forgot Password?</a>
        </div>
          <div class="relative w-full mx-auto">
  <input id="password" type="password" placeholder="Нууц үгээ оруулна уу" class="bg-gray-800 border-2 border-gray-600 w-full p-2 border rounded pr-10" />
  <button type="button" placeholder="Enter your password" id="togglePassword" class="absolute top-1/2 right-2 -translate-y-1/2 text-gray-500 hover:text-gray-700">
    <svg id="eyeIcon" class="w-5 h-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
    </svg>
  </button>
</div>
<button class="bg-white text-black py-2 px-4 rounded-full">Нэвтрэх</button>
<div class="flex items-start grid grid-cols-2 gap-4 ml-10">
            <p class="text-white">Privacy Policy</p>
            <p class="text-white">Terms</p>
        </div>
        <div class="flex items-start grid grid-cols-2 ml-10">
            <p class="text-white">Бүртгэлгүй бол</p>
            <a href="" class="text-white underline">ЭНД ДАРНА УУ</a>
        </div>
        <p class="text-gray-400 ml-20">------эсвэл------</p>
        <button placeholder="Continue with facebook" class="h-10 bg-white text-black py-2 px-4 rounded-full overflow-hidden"><img class="h-[10%] w-[10%] flex" src="facebook-svgrepo-com.svg" alt="Facebook"></button>
        </div>
        
       <script>
          const password = document.getElementById("password");
  const togglePassword = document.getElementById("togglePassword");
  const eyeIcon = document.getElementById("eyeIcon");

  togglePassword.addEventListener("click", function () {
    if (password.type === "password") {
      password.type = "text";
      eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />`;
    } else {
      password.type = "password";
      eyeIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
      <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />`;
    }
  });
       </script>
</body>
</html>
