<script src="https://cdn.tailwindcss.com"></script>

  background: #0f172a;

<body class="bg-gray-100 text-gray-800">

<!-- HEADER -->
<header class="bg-white shadow p-4 sticky top-0">
  <div class="max-w-6xl mx-auto">
    <h1 class="font-bold text-xl">Products</h1>
  </div>
</header>

<!-- BACK -->
<div class="max-w-6xl mx-auto pt-6">
  <a href="../" class="text-blue-600 hover:text-blue-800">
    ← Back
  </a>
</div>

<!-- MAIN -->
<section class="max-w-6xl mx-auto mt-6 bg-white p-6 rounded shadow">

<h2 class="text-3xl font-bold mb-4">Product Add System</h2>

<p class="mb-6 text-gray-600">
Product нэр, үнэ, description, grid ашиглана, Responsive -тай харуулна.
</p>

<!-- FORM -->
<div class="grid md:grid-cols-4 gap-3 mb-6">

  <input class="name border p-2 rounded-lg" placeholder="Product name">

  <input class="price border p-2 rounded-lg" placeholder="Price" type="number">

  <input class="desc border p-2 rounded-lg" placeholder="Description">

  <button class="add bg-blue-500 text-white rounded-lg hover:bg-blue-600">
    Add
  </button>

</div>

<!-- PRODUCT GRID -->
<div class="list grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>

</section>

<script>
const name = document.querySelector(".name");
const price = document.querySelector(".price");
const desc = document.querySelector(".desc");
const add = document.querySelector(".add");
const list = document.querySelector(".list");

add.addEventListener("click", () => {

  const n = name.value.trim();
  const p = price.value.trim();
  const d = desc.value.trim();

  if (!n || !p || !d) return;

  const card = document.createElement("div");

  card.className = "p-4 bg-gray-50 rounded-lg shadow hover:shadow-md transition";

  card.innerHTML = `
    <h3 class="font-bold text-gray-800">${n}</h3>
    <p class="text-blue-600 font-semibold">$${p}</p>
    <p class="text-gray-600 text-sm">${d}</p>
  `;

  list.append(card);

  name.value = "";
  price.value = "";
  desc.value = "";
});
</script>

</body>
