<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="albumList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4"></div>
    <script>
        async function loadPhotos() {
            const list = document.getElementById("albumList");
            list.innerHTML = '<p class="text-gray-500">Loading...</p>';
            const response = await fetch("https://jsonplaceholder.typicode.com/photos");
            const data = await response.json();
            const photos = data.filter(photo => photo.id <= 20);
            list.innerHTML = "";
            photos.map(photo => {
                const card = document.createElement("div");
                card.className = "p-4 bg-white rounded shadow hover:shadow-lg transition";
                card.innerHTML = `
                    <img src="${photo.thumbnailUrl}" alt="${photo.title}" class="w-full h-32 object-cover mb-2 rounded">
                    <p class="font-bold text-lg">${photo.id}</p>
                    <p class="text-gray-600">${photo.title}</p>
                `;
                list.appendChild(card);
            });
        }
        loadPhotos();
    </script>
</body>
</html>
