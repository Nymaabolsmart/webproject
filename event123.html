<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Events</title>
</head>
<body>
<button id="clickBtn">Click Me</button>
<p id="clickOutput"></p>
<input type="text" id="textInput" placeholder="Type something">
<p id="inputOutput"></p>
<div id="hoverBox" style="width:200px;height:100px;background:#ccc;text-align:center;line-height:100px;">
  Hover over me
</div>
<p id="hoverOutput"></p>
<input type="text" id="keyInput" placeholder="Press a key">
<p id="keyOutput"></p>
<form id="myForm">
  <input type="text" id="formInput" placeholder="Type name">
  <button type="submit">Submit</button>
</form>
<p id="formOutput"></p>
<button id="onceBtn">Click Once</button>
<p id="onceOutput"></p>
<script>
document.getElementById("clickBtn").addEventListener("click", function(){
  document.getElementById("clickOutput").innerText = "Button дарлаа!";
});
document.getElementById("textInput").addEventListener("input", function(e){
  document.getElementById("inputOutput").innerText = "Текст: " + e.target.value;
});
const box = document.getElementById("hoverBox");
box.addEventListener("mouseover", function(){
  document.getElementById("hoverOutput").innerText = "Mouse over!";
  document.getElementById("hoverBox").style.backgroundColor = "red";
});
box.addEventListener("mouseout", function(){
  document.getElementById("hoverOutput").innerText = "Mouse out!";
  document.getElementById("hoverBox").style.backgroundColor = "#ccc";
});
document.getElementById("keyInput").addEventListener("keydown", function(e){
  document.getElementById("keyOutput").innerText = "You pressed: " + e.key;
});
document.getElementById("myForm").addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("formOutput").innerText =
    "Form submitted: " + document.getElementById("formInput").value;
});
const onceBtn = document.getElementById("onceBtn");
function handleClick(){
  document.getElementById("onceOutput").innerText = "Clicked once";
  onceBtn.removeEventListener("click", handleClick);
}
onceBtn.addEventListener("click", handleClick);
</script>
</body>
</html>
