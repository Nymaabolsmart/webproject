<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="hoverBox" style="width:200px;height:100px;background:#ccc;text-align:center;line-height:100px;">Hover over me</div>
<p id="hoverOutput"></p>

<script>
const hoverBox = document.getElementById("hoverBox");
const hoverOutput = document.getElementById("hoverOutput");
hoverBox.addEventListener("mouseover", function(){
  hoverOutput.innerText = "Mouse over!";
});
hoverBox.addEventListener("mouseout", function(){
  hoverOutput.innerText = "Mouse out!";
});
</script>
</body>
</html>
